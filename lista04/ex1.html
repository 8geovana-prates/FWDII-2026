<body>
<div class="div1">

<forms>

</forms>
<button onclick="botao()" style="background-color:rgb(73, 14, 12);"> ></button>
<p id="demo"></p>
</div>
</div>
<script>
let clique=false;
function botao(){
    let vet=document.querySelectorAll('input');
    let text="";
    if (clique==true){
        for(let i=0;i<vet.length;i++){
        vet[i].value="";
        }
        document.getElementById("demo").innerHTML="";
        clique=false;
        return;
    }
    let j=1;
    for(let i=0;i<vet.length;i++){
    if(vet[i].value!=""){
    text+=j+ " "+vet[i].value+"<br>";
    j++;  
    }
    }
    document.getElementById("demo").innerHTML=text;
    clique=true;
    }
</script>
