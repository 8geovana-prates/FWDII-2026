<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Calculadora</title>
<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0-beta.2/css/bootstrap.min.css" integrity="sha384-PsH8R72JQ3SOdhVi3uxftmaW6Vc51MKb0q5P2rRUpPvrszuE4W1povHYgTpBfshb" crossorigin="anonymous">

<style>
.calculadora{
    margin-top:40px;
    border:solid 2px #770523;
    padding:20px;
    background-color:#53131E;
    border-radius:10px;
    box-shadow:2px 2px 10px rgba(119,5,35,0.3);
}

.btn{
    width:60px;
    height:50px;
    margin:5px;
    background-color:#770523 !important;
    border-color:#770523 !important;
    color:#F4D9B5 !important;
    box-shadow:1px 1px 3px rgba(119,5,35,0.4);
}

.btn:hover{
    background-color:#8f1031 !important;
    border-color:#8f1031 !important;
}

button:active{
    transform: translateY(1px);
}

.clear{
    width:130px;
}

.enter{
    height:110px;
}

.zero{
    width:130px;
}

.resultado{
    text-align:right;
    font-size:20px;
    margin-top:10px;
    margin-bottom:20px;
    border:solid 2px #770523;
    background-color:#F4D9B5;
    color:#53131E;
    box-shadow:1px 1px 3px rgba(119,5,35,0.3);
}
</style>
</head>

<body style="background:#F4D9B5">

<div class="container">
<div class="row">
<div class="col d-flex justify-content-center">

<div class="calculadora">

<input type="text" class="form-control resultado" id="tela" placeholder="0" disabled="disabled">

<div class="row">
    <button type="button" class="btn btn-lg clear font-weight-light" onclick="clear()">C</button>
    <button type="button" class="btn btn-lg font-weight-light" onclick="digitar('/')">/</button>
    <button type="button" class="btn btn-lg font-weight-light" onclick="digitar('x')">x</button>
</div>

<div class="row">
    <button type="button" class="btn btn-lg font-weight-light" onclick="digitar('7')">7</button>
    <button type="button" class="btn btn-lg font-weight-light" onclick="digitar('8')">8</button>
    <button type="button" class="btn btn-lg font-weight-light" onclick="digitar('9')">9</button>
    <button type="button" class="btn btn-lg font-weight-light" onclick="digitar('-')">-</button>
</div>

<div class="row">
    <button type="button" class="btn btn-lg font-weight-light" onclick="digitar('4')">4</button>
    <button type="button" class="btn btn-lg font-weight-light" onclick="digitar('5')">5</button>
    <button type="button" class="btn btn-lg font-weight-light" onclick="digitar('6')">6</button>
    <button type="button" class="btn btn-lg font-weight-light" onclick="digitar('+')">+</button>
</div>

<div class="row">
    <button type="button" class="btn btn-lg font-weight-light" onclick="digitar('1')">1</button>
    <button type="button" class="btn btn-lg font-weight-light" onclick="digitar('2')">2</button>
    <button type="button" class="btn btn-lg font-weight-light" onclick="digitar('3')">3</button>
    <button type="button" class="btn btn-lg enter" onclick="calcular()">=</button>
</div>

<div class="row" style="margin-top:-60px">
    <button type="button" class="btn zero btn-lg font-weight-light" onclick="digitar('0')">0</button>
    <button type="button" class="btn btn-lg font-weight-light" onclick="digitar('.')">.</button>
</div>
</div>
</div>
</div>
</div>

<script>
function clear(){
    document.getElementById("tela").value="";
}

function digitar(valor){
    document.getElementById("tela").value+=valor;
}

function calcular(){
    let operacao=document.getElementById("tela").value;

    let numeros=[];
    let operadores=[];
    let valor="";

    for(let i=0;i<operacao.length;i++){
        
        if((operacao[i]>="0" && operacao[i]<="9") || operacao[i]=="."){
            valor+=operacao[i];
        }

        else{
            numeros.push(Number(valor));
            operadores.push(operacao[i]);
            valor="";
        }
    }
    numeros.push(Number(valor));

    for(let i=0;i<operadores.length;i++){

        if(operadores[i]=="x" || operadores[i]=="/"){
            let conta;
            if(operadores[i]=="x"){
                conta=numeros[i]*numeros[i+1];
            }
            else{
                conta=numeros[i]/numeros[i+1];
            }
            numeros.splice(i,2,conta);
            operadores.splice(i,1);
            i--;
        }
    }

    let resultado=numeros[0];
    for(let i=0;i<operadores.length;i++){
        if(operadores[i]=="+"){
            resultado+=numeros[i+1];
        }
        else if(operadores[i]=="-"){
            resultado-=numeros[i+1];
        }
    }
    document.getElementById("tela").value=resultado;
}
</script>
</body>
</html>
