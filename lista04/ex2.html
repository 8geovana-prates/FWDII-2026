<!DOCTYPE html>
<html>
<head>
    <style>
    *{
        box-sizing: border-box;
    }

    body{
        margin: 0;
    }

    input{
        background-color:rgb(253, 243, 185);
        color: rgb(87, 29, 2);
        border-radius: 3px;
        padding:4px;
        border-color: bisque;
        margin: 3px 0;
        outline-color: rgb(73, 14, 12);
        font-family: 'Times New Roman', Times, serif;
        width: 100%;
        min-width: 0;
        }
        p{
            color:rgb(73, 14, 12);
        }
    img{
        display: block;
        margin: 19px;
        width: 100%;
        height: 200px;
        object-fit: cover;
        border-radius: 25px;
        
    }


    .div1{
        margin: 0 auto;
        width: 100%;
        max-width: 420px;
        min-height: 100vh;
        background-color:rgb(46, 1, 11);
    }


    .div2{
        padding: 20px;
    }


    button{
        appearance: none;
        margin-top: 8px;
        border-color: rgb(255, 238, 145);
        border-radius: 5px;
        color:rgb(255, 237, 186);
    }

    p{
        color:rgb(255, 237, 186);
        margin-top: 15px;
    }
</style>
</head>
<body>
<div class="div1">
    <img src="pumpumpurim.jpg">
    <div class="div2">
<forms>
  <input type="text"> <br>
  <input type="text"> <br>
  <input type="text"> <br>
  <input type="text"> <br>
  <input type="text"> <br>
  <input type="text"> <br>
  <input type="text"> <br>
  <input type="text"> <br>
  <input type="text"> <br>
  <input type="text"> <br>
</forms>
<button onclick="botao()" style="background-color:rgb(73, 14, 12);"> ></button>
<p id="demo"></p>
</div>
</div>
<script>
let clique=false;
function botao(){
    let vet=document.querySelectorAll('input');
    let text="";
    if (clique==true){
        for(let i=0;i<vet.length;i++){
        vet[i].value="";
        }
        document.getElementById("demo").innerHTML="";
        clique=false;
        return;
    }
    let j=1;
    for(let i=0;i<vet.length;i++){
    if(vet[i].value!=""){
    text+=j+ ". "+vet[i].value+"<br>";
    j++;  
    }
    }
    document.getElementById("demo").innerHTML=text;
    clique=true;
    }
</script>
</body>
</html>
