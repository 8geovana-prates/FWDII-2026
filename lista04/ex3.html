<!DOCTYPE html>
<html>
<head>
    <style>
    *{
        box-sizing: border-box;
    }

    body{
        margin: 0;
    }

    input{
        background-color:rgb(253, 243, 185);
        color: rgb(87, 29, 2);
        border-radius: 3px;
        padding:4px;
        border-color: bisque;
        margin: 3px 0;
        outline-color: rgb(73, 14, 12);
        font-family: 'Times New Roman', Times, serif;
        width: 100%;
        min-width: 0;
        }
        p{
            color:rgb(73, 14, 12);
        }
        
        img{
        display: block;
        padding-top: 10px;
        width: 95%;
        height: 200px;
        object-fit: cover;
        border-radius: 25px;
        margin: 0 auto;
    }


    .div1{
        margin: 0 auto;
        width: 100%;
        max-width: 420px;
        min-height: 100vh;
        background-color:rgb(46, 1, 11);
    }


    .div2{
        padding: 20px;
        color:rgb(255, 237, 186);
    }


    button{
        appearance: none;
        margin-top: 8px;
        border-color: rgb(255, 238, 145);
        border-radius: 5px;
        color:rgb(255, 237, 186);
    }

    p{
        color:rgb(255, 237, 186);
        margin-top: 15px;
    }
</style>
</head>
<body>
<div class="div1">
    <img src="pumpumpurim.jpg">
    <div class="div2">
    Lista de compras:
<forms>
  <input type="text"> <br>
  <input type="text"> <br>
  <input type="text"> <br>
  <input type="text"> <br>
  <input type="text"> <br>
  <input type="text"> <br>
  <input type="text"> <br>
  <input type="text"> <br>
  <input type="text"> <br>
  <input type="text"> <br>
</forms>
<button onclick="botao()" style="background-color:rgb(73, 14, 12);"> ></button>
<p id="demo"></p>
</div>
</div>
<script>
let clique=false;
function botao(){
    let vet=document.querySelectorAll('input');
    let lista=[];
    let text="";

    if(clique==true){
        for(let i=0;i<vet.length;i++){
            vet[i].value="";
        }
        document.getElementById("demo").innerHTML="";
        clique=false;
        return;
    }

    for(let i=0;i<vet.length;i++){
        if(vet[i].value!=""){
            lista.push(vet[i].value);
        }
    }

    for(let i=0;i<lista.length-1;i++){
        for(let j=i+1;j<lista.length;j++){
            if(lista[i].toLowerCase()>lista[j].toLowerCase()){
                let aux=lista[i];
                lista[i]=lista[j];
                lista[j]=aux;
            }
        }
    }
    let j=1;
    for(let i=0;i<lista.length;i++){
        text+=j+". "+lista[i]+"<br>";
        j++;
    }
    document.getElementById("demo").innerHTML=text;
    clique=true;
}

</script>
</body>
</html>
